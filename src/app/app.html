<header
  class="h-16 border-b border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900"
>
  <div class="mx-auto flex h-full max-w-6xl items-center justify-between px-4">
    <a
      routerLink="/"
      class="flex items-center gap-2 text-lg font-bold text-slate-800 dark:text-slate-100"
    >
      <i class="pi pi-flag text-indigo-500"></i>
      {{ brand() }}
    </a>

    <div class="flex items-center gap-2">
      <button
        type="button"
        (click)="toggleTheme()"
        [attr.aria-label]="isDark() ? 'Cambiar a tema claro' : 'Cambiar a tema oscuro'"
        class="grid size-10 place-items-center rounded-lg text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800"
      >
        <i [class]="isDark() ? 'pi pi-sun' : 'pi pi-moon'"></i>
      </button>
      <a
        routerLink="/reportar"
        class="rounded-lg bg-red-500 px-4 py-2 text-sm font-medium text-white hover:bg-red-600"
      >
        Reportar
      </a>
    </div>
  </div>
</header>

<router-outlet />
