<section class="relative h-[calc(100dvh-8rem)] w-full md:h-[calc(100dvh-4rem)]">
  <!-- Contenedor del mapa -->
  <div #map class="absolute inset-0"></div>

  <!-- Panel flotante de resumen -->
  <div
    class="absolute top-4 left-4 z-10 max-w-xs rounded-xl bg-white/95 px-4 py-3 shadow-lg backdrop-blur dark:bg-slate-900/90"
  >
    <p class="text-sm font-semibold text-slate-700 dark:text-slate-100">
      {{ count() }} reporte(s) activo(s)
    </p>
    @if (oldest() > 0) {
      <p class="text-xs text-slate-500 dark:text-slate-400">
        El más antiguo lleva {{ oldest() }} días sin atender
      </p>
    }
    <div class="mt-2 flex items-center gap-2 text-[11px] text-slate-500 dark:text-slate-400">
      <span class="inline-flex items-center gap-1"><span class="size-2 rounded-full" style="background:#22c55e"></span>nuevo</span>
      <span class="inline-flex items-center gap-1"><span class="size-2 rounded-full" style="background:#eab308"></span>+3d</span>
      <span class="inline-flex items-center gap-1"><span class="size-2 rounded-full" style="background:#f97316"></span>+7d</span>
      <span class="inline-flex items-center gap-1"><span class="size-2 rounded-full" style="background:#ef4444"></span>+30d</span>
    </div>
  </div>

  <!-- Botón de acción (solo escritorio; en móvil está el FAB del bottom-nav) -->
  <p-button
    routerLink="/reportar"
    label="Reportar"
    icon="pi pi-plus"
    styleClass="!absolute bottom-44 right-6 z-10 shadow-lg hidden md:!inline-flex"
    severity="danger"
  />

  <!-- Bottom-sheet de recientes -->
  <div
    class="absolute inset-x-0 bottom-0 z-10 rounded-t-2xl bg-white px-4 pb-4 pt-3 shadow-[0_-4px_20px_rgba(0,0,0,0.08)] dark:bg-slate-900"
  >
    <div class="mx-auto mb-2 h-1 w-10 rounded-full bg-slate-300 dark:bg-slate-700"></div>
    <div class="flex items-center justify-between">
      <h2 class="text-sm font-bold text-slate-700 dark:text-slate-100">Recientes</h2>
      <a routerLink="/reportes" class="text-xs font-semibold text-indigo-500">Ver todos</a>
    </div>

    <div class="mt-3 flex gap-3 overflow-x-auto pb-1">
      @for (r of recent(); track r.id) {
        <a
          [routerLink]="['/reporte', r.id]"
          class="flex w-44 shrink-0 items-center gap-3 rounded-xl border border-slate-200 p-3 dark:border-slate-800"
        >
          <span
            class="grid size-9 shrink-0 place-items-center rounded-full text-white"
            [style.background]="ageColorFn(daysSinceFn(r.createdAt))"
          >
            <i [class]="meta[r.category].icon" class="text-sm"></i>
          </span>
          <div class="min-w-0">
            <p class="truncate text-sm font-semibold text-slate-700 dark:text-slate-200">
              {{ meta[r.category].label }}
            </p>
            <p class="text-[11px] text-slate-400">{{ daysSinceFn(r.createdAt) }} días</p>
          </div>
        </a>
      }
    </div>
  </div>
</section>
