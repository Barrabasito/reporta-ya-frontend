<section class="mx-auto max-w-lg px-4 py-8">
  <a routerLink="/" class="text-sm text-slate-500 hover:text-slate-700 inline-flex items-center gap-1">
    <i class="pi pi-arrow-left"></i> Volver al mapa
  </a>

  <h1 class="mt-4 text-2xl font-bold text-slate-800">Nuevo reporte</h1>
  <p class="text-slate-500 text-sm">Anónimo. Sin cuenta. Solo dinos qué y dónde.</p>

  <div class="mt-6 space-y-6">
    <!-- Categoría -->
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-2">¿Qué quieres reportar?</label>
      <p-select
        [options]="categories"
        optionLabel="label"
        optionValue="value"
        placeholder="Elige una categoría"
        [ngModel]="category()"
        (ngModelChange)="category.set($event)"
        styleClass="w-full"
      >
        <ng-template #item let-opt>
          <span class="inline-flex items-center gap-2"><i [class]="opt.icon"></i>{{ opt.label }}</span>
        </ng-template>
      </p-select>
      @if (submitted() && !category()) {
        <small class="text-red-500">Selecciona una categoría.</small>
      }
    </div>

    <!-- Ubicación -->
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-2">Ubicación</label>
      <p-button
        [label]="addressLabel() ?? 'Usar mi ubicación'"
        [icon]="locating() ? 'pi pi-spin pi-spinner' : 'pi pi-map-marker'"
        [outlined]="!addressLabel()"
        [disabled]="locating()"
        (onClick)="locate()"
        styleClass="w-full"
      />
      <p class="mt-1 text-xs text-slate-400">
        Guardamos una posición aproximada, nunca tu dirección exacta.
      </p>
      @if (submitted() && !location()) {
        <small class="text-red-500">Necesitamos la ubicación del problema.</small>
      }
    </div>

    <!-- Descripción -->
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-2">
        Descripción <span class="text-slate-400 font-normal">(opcional)</span>
      </label>
      <textarea
        pTextarea
        [ngModel]="description()"
        (ngModelChange)="description.set($event)"
        rows="3"
        maxlength="280"
        placeholder="Describe brevemente el problema…"
        class="w-full"
      ></textarea>
    </div>

    <p-button
      label="Publicar reporte"
      icon="pi pi-send"
      severity="danger"
      [disabled]="!canSubmit()"
      (onClick)="submit()"
      styleClass="w-full"
    />
  </div>
</section>
